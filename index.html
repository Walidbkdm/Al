<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algerian Ecom Command Center + Confirm Pro</title>
  <meta name="description" content="Operations dashboard and smart order confirmation system for Algerian COD e-commerce sellers." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind (CDN for zero-install) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            ar: ['Cairo', 'Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#eefdf4',
              100: '#d5fae4',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
            },
          },
          boxShadow: {
            soft: '0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06)',
            card: '0 4px 20px -6px rgba(16,24,40,.08)',
          },
        },
      },
    };
  </script>

  <!-- React, ReactDOM, Recharts, Babel -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    html, body, #root { height: 100%; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f6f8fb;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }
    .ar { font-family: 'Cairo', 'Inter', sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #d6dbe3; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .kanban-col { min-width: 300px; }
    /* Loading screen */
    .boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #f6f8fb; font-family: Inter, sans-serif; color: #475569;
    }
    .boot .dot { width: 8px; height: 8px; background: #10b981; border-radius: 999px; margin: 0 3px;
      animation: bounce 1s infinite ease-in-out; display: inline-block; }
    .boot .dot:nth-child(2) { animation-delay: .15s }
    .boot .dot:nth-child(3) { animation-delay: .3s }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(.6); opacity: .5 } 40% { transform: scale(1); opacity: 1 } }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot">
      <div class="text-center">
        <div class="text-lg font-semibold mb-2">Loading Command Center</div>
        <div>
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- App source. Order matters: data -> utils -> components -> pages -> app -->
  <script type="text/babel" data-presets="env,react" src="src/data.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/utils.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/components.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/pages.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="src/app.jsx"></script>
</body>
</html>
